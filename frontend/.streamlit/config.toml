# Tema base do Streamlit — paleta institucional Hipnus (clean / premium).
[theme]
base = "light"
primaryColor = "#7C3AED"          # roxo Hipnus (destaque/CTA)
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F6F4FB"
textColor = "#1A1430"
font = "sans serif"

[server]
headless = true
runOnSave = true

[browser]
gatherUsageStats = false
